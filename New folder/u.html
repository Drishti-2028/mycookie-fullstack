<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Drishti's Enhanced Planner</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@1,400;1,600&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Open Sans', italic;
      background-color: #fff9db; /* Light yellow */
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      background-color: #fff;
      border-radius: 16px;
      padding: 40px;
      width: 90%;
      max-width: 700px;
      box-shadow: 0 20px 30px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      color: #444;
      margin-bottom: 30px;
      font-size: 28px;
      font-style: italic;
    }

    .input-section {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: space-between;
      margin-bottom: 25px;
    }

    input, select, button {
      font-family: 'Open Sans', italic;
    }

    input[type="text"], input[type="time"], input[type="date"], select {
      padding: 12px 16px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 15px;
      width: 30%;
      background-color: #fefefe;
    }

    button {
      padding: 12px 20px;
      background-color: #ffb300;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s;
    }

    button:hover {
      background-color: #ffa000;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background-color: #fffde7;
      padding: 15px 20px;
      border-radius: 12px;
      margin-bottom: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: transform 0.2s ease-in-out;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
    }

    li:hover {
      transform: scale(1.01);
    }

    .task-info {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .task-text {
      font-size: 16px;
      font-style: italic;
    }

    .meta {
      font-size: 14px;
      color: #555;
    }

    .done {
      text-decoration: line-through;
      color: #aaa;
    }

    .btn-group button {
      margin-left: 8px;
      font-size: 13px;
      padding: 6px 10px;
    }

    .done-btn {
      background-color: #43a047;
    }

    .delete-btn {
      background-color: #e53935;
    }

    .clear-btn {
      background-color: #6d4c41;
      display: block;
      margin: 0 auto;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🌼 Drishti's Elegant Planner</h1>

  <div class="input-section">
    <input type="text" id="taskInput" placeholder="Task">
    <input type="time" id="timeInput">
    <input type="date" id="dateInput">
    <select id="priorityInput">
      <option value="Medium">Priority: Medium</option>
      <option value="High">Priority: High</option>
      <option value="Low">Priority: Low</option>
    </select>
    <button onclick="addTask()">Add</button>
  </div>

  <ul id="taskList"></ul>
  <button class="clear-btn" onclick="clearAll()">🧹 Clear All Tasks</button>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

  window.onload = function () {
    tasks.forEach(task => addTaskToDOM(task));
    setInterval(checkReminders, 60000);
  };

  function addTask() {
    const text = document.getElementById("taskInput").value.trim();
    const time = document.getElementById("timeInput").value;
    const date = document.getElementById("dateInput").value;
    const priority = document.getElementById("priorityInput").value;

    if (!text || !time || !date) return;

    const task = { text, time, date, priority, done: false };
    tasks.push(task);
    localStorage.setItem("tasks", JSON.stringify(tasks));
    addTaskToDOM(task);

    document.getElementById("taskInput").value = "";
    document.getElementById("timeInput").value = "";
    document.getElementById("dateInput").value = "";
  }

  function addTaskToDOM(task) {
    const li = document.createElement("li");

    const info = document.createElement("div");
    info.className = "task-info";
    info.innerHTML = `
      <span class="task-text ${task.done ? 'done' : ''}">${task.text}</span>
      <span class="meta">📅 ${task.date} | ⏰ ${task.time} | ⚡ ${task.priority}</span>
    `;

    const doneBtn = document.createElement("button");
    doneBtn.textContent = task.done ? "Undone" : "Done";
    doneBtn.className = "done-btn";
    doneBtn.onclick = () => toggleDone(task, info, doneBtn);

    const deleteBtn = document.createElement("button");
    deleteBtn.textContent = "Delete";
    deleteBtn.className = "delete-btn";
    deleteBtn.onclick = () => deleteTask(task, li);

    const btnGroup = document.createElement("div");
    btnGroup.className = "btn-group";
    btnGroup.appendChild(doneBtn);
    btnGroup.appendChild(deleteBtn);

    li.appendChild(info);
    li.appendChild(btnGroup);
    document.getElementById("taskList").appendChild(li);
  }

  function toggleDone(task, info, doneBtn) {
    task.done = !task.done;
    const taskText = info.querySelector(".task-text");
    taskText.className = `task-text ${task.done ? 'done' : ''}`;
    doneBtn.textContent = task.done ? "Undone" : "Done";
    localStorage.setItem("tasks", JSON.stringify(tasks));
  }
