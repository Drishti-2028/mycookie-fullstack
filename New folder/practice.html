<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Display Types: inline, inline-block, block</title>
  <style>
    .box {
      padding: 10px;
      margin: 5px;
      border: 2px solid #333;
      background-color: #e0e0e0;
    }

    .inline {
      display: inline;
      width: 200px;
      height: 100px;
      background-color: #ffcdd2;
    }

    .inline-block {
      display: inline-block;
      width: 200px;
      height: 100px;
      background-color: #c8e6c9;
    }

    .block {
      display: block;
      width: 200px;
      height: 100px;
      background-color: #bbdefb;
    }
  </style>
</head>
<body>

  <h2>Inline</h2>
  <div class="box inline">Inline 1</div>
  <div class="box inline">Inline 2</div>

  <h2>Inline-block</h2>
  <div class="box inline-block">Inline-block 1</div>
  <div class="box inline-block">Inline-block 2</div>

  <h2>Block</h2>
  <div class="box block">Block 1</div>
  <div class="box block">Block 2</div>

</body>
</html>
